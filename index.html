    <title>NEON SWEEPER</title>
    <script>
      window.onerror = function (msg, src, line, col, err) {
        window.parent.postMessage(
          {
            type: "app-error",
            message: msg,
            source: src,
            lineno: line,
            colno: col,
            stack: (err && err.stack) || "",
          },
          "*",
        );
      };
      window.onunhandledrejection = function (e) {
        window.parent.postMessage(
          {
            type: "app-error",
            message:
              "Unhandled promise rejection: " +
              ((e.reason && e.reason.message) || e.reason || "unknown"),
            stack: (e.reason && e.reason.stack) || "",
          },
          "*",
        );
      };
      window.addEventListener(
        "error",
        function (e) {
          var t = e && e.target;
          if (t && t !== window && t.tagName === "SCRIPT") {
            var u = t.src || "";
            window.parent.postMessage(
              {
                type: "app-error",
                message:
                  "Failed to load script" + (u ? ": " + u : " (inline module)"),
                source: u,
              },
              "*",
            );
          }
        },
        true,
      );
      (function () {
        var _f = window.fetch;
        window.fetch = function () {
          var a = arguments,
            u = typeof a[0] === "string" ? a[0] : (a[0] && a[0].url) || "";
          var p = _f.apply(this, a);
          p.then(function (r) {
            if (r.status === 500) {
              r.clone()
                .text()
                .then(function (b) {
                  window.parent.postMessage(
                    { type: "fetch-error", url: u, status: 500, body: b },
                    "*",
                  );
                })
                .catch(function () {
                  window.parent.postMessage(
                    { type: "fetch-error", url: u, status: 500, body: "" },
                    "*",
                  );
                });
            }
          }).catch(function (e) {
            window.parent.postMessage(
              {
                type: "fetch-error",
                url: u,
                status: 0,
                body: e.message || "fetch failed",
              },
              "*",
            );
          });
          return p;
        };
      })();
      (function () {
        var ov,
          cur,
          on = false;
        function box(el) {
          if (!ov) {
            ov = document.createElement("div");
            ov.style.cssText =
              "position:fixed;z-index:2147483647;pointer-events:none;border:2px solid #2563eb;background:rgba(37,99,235,0.12);border-radius:2px;box-sizing:border-box;";
            document.documentElement.appendChild(ov);
          }
          var r = el.getBoundingClientRect();
          ov.style.left = r.left + "px";
          ov.style.top = r.top + "px";
          ov.style.width = r.width + "px";
          ov.style.height = r.height + "px";
        }
        function esc(s) {
          return window.CSS && CSS.escape ? CSS.escape(s) : s;
        }
        function sel(el) {
          var p = [],
            n = el;
          while (n && n.nodeType === 1 && n.tagName !== "HTML") {
            var s = n.tagName.toLowerCase();
            if (n.id) {
              p.unshift(s + "#" + esc(n.id));
              break;
            }
            var par = n.parentNode;
            if (par) {
              var same = Array.prototype.filter.call(
                par.children,
                function (c) {
                  return c.tagName === n.tagName;
                },
              );
              if (same.length > 1) {
                s +=
                  ":nth-of-type(" +
                  (Array.prototype.indexOf.call(same, n) + 1) +
                  ")";
              }
            }
            p.unshift(s);
            n = par;
          }
          return p.join(" > ");
        }
        function clip(s, n) {
          s = s || "";
          return s.length > n ? s.slice(0, n) + "..." : s;
        }
        function mm(e) {
          if (!on) {
            return;
          }
          cur = e.target;
          box(cur);
        }
        function clk(e) {
          if (!on) {
            return;
          }
          e.preventDefault();
          e.stopPropagation();
          try {
            var el = e.target;
            window.parent.postMessage(
              {
                type: "puter-element-selected",
                selector: sel(el),
                tag: el.tagName.toLowerCase(),
                id: el.id || "",
                className: typeof el.className === "string" ? el.className : "",
                text: clip((el.textContent || "").trim(), 200),
                html: clip(el.outerHTML || "", 800),
              },
              "*",
            );
          } finally {
            stop();
          }
        }
        function start() {
          if (on) {
            return;
          }
          on = true;
          document.addEventListener("mousemove", mm, true);
          document.addEventListener("click", clk, true);
          if (document.body) {
            document.body.style.cursor = "crosshair";
          }
        }
        function stop() {
          on = false;
          if (ov && ov.parentNode) {
            ov.parentNode.removeChild(ov);
          }
          ov = null;
          document.removeEventListener("mousemove", mm, true);
          document.removeEventListener("click", clk, true);
          if (document.body) {
            document.body.style.cursor = "";
          }
        }
        window.addEventListener("message", function (e) {
          if (e.source !== window.parent) {
            return;
          }
          if (!e.data || e.data.type !== "puter-select-mode") {
            return;
          }
          if (e.data.enabled) {
            start();
            window.parent.postMessage({ type: "puter-select-ready" }, "*");
          } else {
            stop();
          }
        });
        window.addEventListener(
          "scroll",
          function () {
            if (on && cur) {
              box(cur);
            }
          },
          true,
        );
        window.addEventListener(
          "resize",
          function () {
            if (on && cur) {
              box(cur);
            }
          },
          true,
        );
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
      :root {
        --neon-cyan: #00f0ff;
        --neon-pink: #ff2a6d;
        --neon-purple: #b026ff;
        --neon-yellow: #f9f871;
        --bg: #05010f;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
        overscroll-behavior: none;
      }
      body {
        background: var(--bg);
        font-family: "Share Tech Mono", monospace;
        color: #cfe9ff;
        background-image:
          radial-gradient(
            circle at 20% 0%,
            rgba(176, 38, 255, 0.18),
            transparent 45%
          ),
          radial-gradient(
            circle at 85% 100%,
            rgba(0, 240, 255, 0.15),
            transparent 45%
          ),
          linear-gradient(rgba(0, 240, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
        background-size:
          auto,
          auto,
          34px 34px,
          34px 34px;
        user-select: none;
      }
      .font-display {
        font-family: "Orbitron", sans-serif;
      }
      .neon-text {
        text-shadow:
          0 0 6px var(--neon-cyan),
          0 0 14px rgba(0, 240, 255, 0.5);
      }
      .neon-pink-text {
        text-shadow:
          0 0 6px var(--neon-pink),
          0 0 14px rgba(255, 42, 109, 0.5);
      }

      .panel {
        background: rgba(10, 5, 25, 0.72);
        border: 1px solid rgba(0, 240, 255, 0.35);
        box-shadow: inset 0 0 18px rgba(0, 240, 255, 0.08);
        backdrop-filter: blur(4px);
      }

      #grid {
        display: grid;
        gap: 3px;
        touch-action: manipulation;
        justify-content: center;
        margin: 0 auto;
      }
      .cell {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Orbitron", sans-serif;
        font-weight: 700;
        border-radius: 3px;
        position: relative;
        box-sizing: border-box;
        transition:
          transform 0.05s,
          background 0.1s;
        line-height: 1;
      }
      .cell i {
        display: block;
        width: 64%;
        height: 64%;
      }
      .cell.covered {
        background: linear-gradient(145deg, #160b2e, #0c0620);
        border: 1px solid rgba(176, 38, 255, 0.45);
        box-shadow: inset 0 0 6px rgba(176, 38, 255, 0.25);
        color: transparent;
        cursor: pointer;
      }
      .cell.covered:active {
        transform: scale(0.9);
      }
      .cell.revealed {
        background: rgba(0, 240, 255, 0.05);
        border: 1px solid rgba(0, 240, 255, 0.18);
      }
      .cell.flag {
        color: var(--neon-yellow);
      }
      .cell.mine {
        background: rgba(255, 42, 109, 0.18);
        border: 1px solid var(--neon-pink);
      }
      .cell.exploded {
        background: var(--neon-pink);
      }
      .c1 {
        color: #00f0ff;
        text-shadow: 0 0 6px #00f0ff;
      }
      .c2 {
        color: #39ff14;
        text-shadow: 0 0 6px #39ff14;
      }
      .c3 {
        color: #ff2a6d;
        text-shadow: 0 0 6px #ff2a6d;
      }
      .c4 {
        color: #b026ff;
        text-shadow: 0 0 6px #b026ff;
      }
      .c5 {
        color: #f9f871;
        text-shadow: 0 0 6px #f9f871;
      }
      .c6 {
        color: #ff9f1c;
        text-shadow: 0 0 6px #ff9f1c;
      }
      .c7 {
        color: #ff5cf4;
        text-shadow: 0 0 6px #ff5cf4;
      }
      .c8 {
        color: #ffffff;
        text-shadow: 0 0 6px #fff;
      }

      .mode-btn.active {
        background: var(--neon-cyan);
        color: #05010f;
        box-shadow: 0 0 14px rgba(0, 240, 255, 0.7);
      }
      .btn-neon {
        border: 1px solid var(--neon-cyan);
        color: var(--neon-cyan);
        transition: all 0.15s;
      }
      .btn-neon:active {
        background: var(--neon-cyan);
        color: #05010f;
      }
      .btn-neon.muted {
        border-color: rgba(255, 42, 109, 0.7);
        color: var(--neon-pink);
      }

      .diff-btn.active {
        border-color: var(--neon-pink);
        color: #05010f;
        background: var(--neon-pink);
        box-shadow: 0 0 14px rgba(255, 42, 109, 0.6);
      }

      @keyframes flicker {
        0%,
        100% {
          opacity: 1;
        }
        92% {
          opacity: 1;
        }
        93% {
          opacity: 0.4;
        }
        94% {
          opacity: 1;
        }
      }
      .flicker {
        animation: flicker 4s infinite;
      }

      #overlay {
        transition: opacity 0.3s;
      }
      .scanlines::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 50;
        background: repeating-linear-gradient(
          transparent 0 2px,
          rgba(0, 0, 0, 0.15) 2px 4px
        );
        opacity: 0.35;
      }
    </style>
  </head>
  <body class="scanlines min-h-screen flex flex-col items-center">
    <div
      class="w-full max-w-md px-3 pt-4 pb-6 flex flex-col min-h-screen"
      style="
        padding-top: max(1rem, env(safe-area-inset-top));
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      "
    >
      <!-- Header -->
      <header class="text-center mb-3">
        <h1
          class="font-display text-2xl sm:text-3xl font-black tracking-widest neon-text flicker"
        >
          NEON<span class="neon-pink-text">SWEEPER</span>
        </h1>
        <p class="text-[10px] tracking-[0.4em] text-cyan-300/60 mt-1">
          // DEFUSE THE GRID //
        </p>
      </header>

      <!-- Difficulty -->
      <div id="diffRow" class="grid grid-cols-3 gap-2 mb-3">
        <button
          data-diff="easy"
          class="diff-btn active panel rounded py-2 text-xs tracking-widest font-display"

        </button>
        <button
          data-diff="medium"
          class="diff-btn panel rounded py-2 text-xs tracking-widest font-display"
        >
          MEDIUM
        </button>
        <button
          data-diff="hard"
          class="diff-btn panel rounded py-2 text-xs tracking-widest font-display"
        >
          HARD
        </button>
      </div>

      <!-- Stats -->
      <div
        class="panel rounded-lg px-3 py-2 mb-3 flex items-center justify-between"
      >
        <div class="flex items-center gap-2">
          <i data-lucide="bomb" class="w-4 h-4 text-pink-400"></i>
          <span
            id="mineCount"
            class="font-display text-lg text-pink-400 neon-pink-text"
            >000</span
          >
        </div>
        <div class="flex items-center gap-2">
          <button
            id="muteBtn"
            class="btn-neon rounded-full w-10 h-10 flex items-center justify-center panel"
          >
            <i data-lucide="volume-2" class="w-5 h-5"></i>
          </button>
          <button
            id="resetBtn"
            class="btn-neon rounded-full w-10 h-10 flex items-center justify-center panel"
          >
            <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="flex items-center gap-2">
          <span id="timer" class="font-display text-lg text-cyan-300 neon-text"
            >000</span
          >
          <i data-lucide="timer" class="w-4 h-4 text-cyan-300"></i>
        </div>
      </div>

      <!-- Board -->
      <div class="relative flex items-start justify-center mb-4">
        <div
          id="boardPanel"
          class="panel rounded-lg p-2 relative w-full flex items-center justify-center"
        >
          <div id="grid"></div>

          <!-- Overlay -->
          <div
            id="overlay"
            class="hidden absolute inset-0 flex-col items-center justify-center rounded-lg bg-black/85 text-center px-6 z-40"
          >
            <div id="overlayIcon" class="mb-3"></div>
            <h2
              id="overlayTitle"
              class="font-display text-2xl font-black tracking-widest"
            ></h2>
            <p id="overlaySub" class="text-xs text-cyan-300/70 mt-2 mb-5"></p>
            <button
              id="playAgain"
              class="btn-neon panel rounded px-6 py-2 font-display tracking-widest text-sm"
            >
              PLAY AGAIN
            </button>
          </div>
        </div>
      </div>

      <!-- Mode toggle -->
      <div class="mt-auto grid grid-cols-2 gap-2">
        <button
          id="digMode"
          class="mode-btn active panel rounded-lg py-3 flex items-center justify-center gap-2 font-display text-sm tracking-widest"
        >
          <i data-lucide="pickaxe" class="w-4 h-4"></i> DIG
        </button>
        <button
          id="flagMode"
          class="mode-btn panel rounded-lg py-3 flex items-center justify-center gap-2 font-display text-sm tracking-widest"
        >
          <i data-lucide="flag-triangle-right" class="w-4 h-4"></i> FLAG
        </button>
      </div>
      <p class="text-center text-[10px] text-cyan-300/40 mt-2 tracking-widest">
        TAP TO DIG · LONG-PRESS TO FLAG
      </p>
    </div>

    <script type="module">
      import {
        createIcons,
        icons,
      } from "https://cdn.jsdelivr.net/npm/lucide@latest/+esm";

      const DIFFS = {
        easy: { cols: 9, rows: 11, mines: 12 },
        medium: { cols: 12, rows: 15, mines: 30 },
        hard: { cols: 14, rows: 18, mines: 55 },
      };

      const gridEl = document.getElementById("grid");
      const boardPanel = document.getElementById("boardPanel");
      const mineCountEl = document.getElementById("mineCount");
      const timerEl = document.getElementById("timer");
      const overlay = document.getElementById("overlay");
      const muteBtn = document.getElementById("muteBtn");

      let diff = "easy";
      let cols, rows, mines;
      let board = [];
      let firstClick = true;
      let gameOver = false;
      let flags = 0;
      let revealedCount = 0;
      let timer = 0,
        timerInt = null;
      let mode = "dig";

      /* ---------- Audio engine (Web Audio synth) ---------- */
      let audioCtx = null;
      let muted = false;
      try {
        muted = localStorage.getItem("ns_muted") === "1";
      } catch (e) {}

      function ensureAudio() {
        if (!audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) audioCtx = new AC();
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      }

      function tone(freq, start, dur, type, gain) {
        const ctx = audioCtx;
        const t0 = ctx.currentTime + start;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type || "sine";
        osc.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.02);
        return osc;
      }
      function sweep(f1, f2, start, dur, type, gain) {
        const ctx = audioCtx;
        const t0 = ctx.currentTime + start;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type || "sawtooth";
        osc.frequency.setValueAtTime(f1, t0);
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, f2), t0 + dur);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.02);
      }
      function noiseBurst(start, dur, gain) {
        const ctx = audioCtx;
        const t0 = ctx.currentTime + start;
        const n = Math.floor(ctx.sampleRate * dur);
        const buf = ctx.createBuffer(1, n, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) {
          d[i] = (Math.random() * 2 - 1) * (1 - i / n);
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type = "lowpass";
        filt.frequency.value = 1200;
        const g = ctx.createGain();
        g.gain.value = gain;
        src.connect(filt);
        filt.connect(g);
        g.connect(ctx.destination);
        src.start(t0);
      }

      function sfx(kind) {
        if (muted) return;
        const ctx = ensureAudio();
        if (!ctx) return;
        switch (kind) {
          case "dig":
            tone(660, 0, 0.09, "square", 0.12);
            break;
          case "flag":
            tone(880, 0, 0.06, "triangle", 0.14);
            tone(1320, 0.05, 0.07, "triangle", 0.1);
            break;
          case "win":
            [523, 659, 784, 1047].forEach((f, i) =>
              tone(f, i * 0.11, 0.28, "square", 0.13),
            );
            sweep(400, 1600, 0.05, 0.5, "sawtooth", 0.05);
            break;
          case "lose":
            noiseBurst(0, 0.5, 0.35);
            sweep(300, 40, 0, 0.7, "sawtooth", 0.16);
            tone(120, 0, 0.5, "square", 0.1);
            break;
        }
      }

      function updateMuteUI() {
        muteBtn.classList.toggle("muted", muted);
        muteBtn.innerHTML = muted
          ? '<i data-lucide="volume-x" class="w-5 h-5"></i>'
          : '<i data-lucide="volume-2" class="w-5 h-5"></i>';
        createIcons({ icons });
      }
      muteBtn.addEventListener("click", () => {
        muted = !muted;
        try {
          localStorage.setItem("ns_muted", muted ? "1" : "0");
        } catch (e) {}
        if (!muted) {
          ensureAudio();
          sfx("flag");
        }
        updateMuteUI();
      });

      const pad = (n) => String(Math.min(999, n)).padStart(3, "0");
      function vibrate(ms) {
        if (navigator.vibrate) navigator.vibrate(ms);
      }

      function startTimer() {
        stopTimer();
        timerInt = setInterval(() => {
          timer++;
          timerEl.textContent = pad(timer);
        }, 1000);
      }
      function stopTimer() {
        if (timerInt) {
          clearInterval(timerInt);
          timerInt = null;
        }
      }

      function sizeGrid() {
        const gap = 3;
        const avail = boardPanel.clientWidth - 16; // panel p-2 = 8px each side
        let size = Math.floor((avail - gap * (cols - 1)) / cols);
        size = Math.max(14, size);
        gridEl.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
        gridEl.style.gridAutoRows = `${size}px`;
        gridEl.style.fontSize = Math.max(10, Math.floor(size * 0.5)) + "px";
      }
      window.addEventListener("resize", () => {
        if (cols) sizeGrid();
      });

      function newGame() {
        const cfg = DIFFS[diff];
        cols = cfg.cols;
        rows = cfg.rows;
        mines = cfg.mines;
        board = [];
        firstClick = true;
        gameOver = false;
        flags = 0;
        revealedCount = 0;
        timer = 0;
        stopTimer();
        timerEl.textContent = "000";
        mineCountEl.textContent = pad(mines);
        overlay.classList.add("hidden");
        overlay.classList.remove("flex");

        gridEl.innerHTML = "";

        for (let r = 0; r < rows; r++) {
          board[r] = [];
          for (let c = 0; c < cols; c++) {
            const cell = {
              r,
              c,
              mine: false,
              revealed: false,
              flag: false,
              adj: 0,
              el: null,
            };
            const el = document.createElement("div");
            el.className = "cell covered";
            el.dataset.r = r;
            el.dataset.c = c;
            cell.el = el;
            board[r][c] = cell;
            gridEl.appendChild(el);
            attachHandlers(el, cell);
          }
        }
        sizeGrid();
      }

      function placeMines(safeR, safeC) {
        let placed = 0;
        const safe = new Set();
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            const nr = safeR + dr,
              nc = safeC + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
              safe.add(nr + "_" + nc);
          }
        while (placed < mines) {
          const r = Math.floor(Math.random() * rows);
          const c = Math.floor(Math.random() * cols);
          if (board[r][c].mine || safe.has(r + "_" + c)) continue;
          board[r][c].mine = true;
          placed++;
        }
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++) {
            if (board[r][c].mine) continue;
            let n = 0;
            forEachNeighbor(r, c, (nr, nc) => {
              if (board[nr][nc].mine) n++;
            });
            board[r][c].adj = n;
          }
      }

      function forEachNeighbor(r, c, fn) {
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr,
              nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) fn(nr, nc);
          }
      }

      function reveal(cell) {
        if (cell.revealed || cell.flag) return;
        cell.revealed = true;
        revealedCount++;
        const el = cell.el;
        el.classList.remove("covered", "flag");
        el.classList.add("revealed");
        el.textContent = "";
        if (cell.mine) {
          el.classList.add("exploded");
          el.innerHTML = '<span style="font-size:1.1em">✸</span>';
          return;
        }
        if (cell.adj > 0) {
          el.textContent = cell.adj;
          el.classList.add("c" + cell.adj);
        } else {
          forEachNeighbor(cell.r, cell.c, (nr, nc) => {
            const n = board[nr][nc];
            if (!n.revealed && !n.flag) reveal(n);
          });
        }
      }

      function digCell(cell) {
        if (gameOver || cell.revealed || cell.flag) return;
        if (firstClick) {
          placeMines(cell.r, cell.c);
          firstClick = false;
          startTimer();
        }
        if (cell.mine) {
          reveal(cell);
          loseGame(cell);
          return;
        }
        reveal(cell);
        vibrate(10);
        sfx("dig");
        checkWin();
      }

      function toggleFlag(cell) {
        if (gameOver || cell.revealed) return;
        cell.flag = !cell.flag;
        const el = cell.el;
        if (cell.flag) {
          flags++;
          el.classList.add("flag");
          el.innerHTML = '<i data-lucide="flag-triangle-right"></i>';
          createIcons({ icons });
          vibrate(15);
          sfx("flag");
        } else {
          flags--;
          el.classList.remove("flag");
          el.innerHTML = "";
        }
        mineCountEl.textContent = pad(Math.max(0, mines - flags));
      }

      function loseGame(hit) {
        gameOver = true;
        stopTimer();
        vibrate([40, 30, 80]);
        sfx("lose");
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++) {
            const cell = board[r][c];
            if (cell.mine && !cell.flag && cell !== hit) {
              cell.el.classList.remove("covered");
              cell.el.classList.add("revealed", "mine");
              cell.el.innerHTML = '<span style="font-size:1.05em">✸</span>';
            }
            if (!cell.mine && cell.flag) {
              cell.el.innerHTML = '<span style="color:#ff2a6d">✕</span>';
            }
          }
        showOverlay(false);
      }

      function checkWin() {
        if (revealedCount === rows * cols - mines) {
          gameOver = true;
          stopTimer();
          vibrate([30, 20, 30, 20, 60]);
          sfx("win");
          for (let r = 0; r < rows; r++)
            for (let c = 0; c < cols; c++) {
              const cell = board[r][c];
              if (cell.mine && !cell.flag) {
                cell.flag = true;
                cell.el.classList.add("flag");
                cell.el.innerHTML = '<i data-lucide="flag-triangle-right"></i>';
              }
            }
          createIcons({ icons });
          mineCountEl.textContent = "000";
          showOverlay(true);
        }
      }

      function showOverlay(win) {
        const icon = document.getElementById("overlayIcon");
        const title = document.getElementById("overlayTitle");
        const sub = document.getElementById("overlaySub");
        if (win) {
          icon.innerHTML =
            '<i data-lucide="shield-check" class="w-14 h-14 text-cyan-300"></i>';
          title.textContent = "GRID SECURED";
          title.className =
            "font-display text-2xl font-black tracking-widest neon-text";
          sub.textContent = `All mines defused in ${timer}s. System restored.`;
        } else {
          icon.innerHTML =
            '<i data-lucide="skull" class="w-14 h-14 text-pink-500"></i>';
          title.textContent = "SYSTEM BREACH";
          title.className =
            "font-display text-2xl font-black tracking-widest neon-pink-text";
          sub.textContent = "A mine detonated. The grid is lost.";
        }
        overlay.classList.remove("hidden");
        overlay.classList.add("flex");
        createIcons({ icons });
      }

      function attachHandlers(el, cell) {
        let pressTimer = null;
        let longPressed = false;

        const start = (e) => {
          if (gameOver) return;
          ensureAudio();
          longPressed = false;
          pressTimer = setTimeout(() => {
            longPressed = true;
            toggleFlag(cell);
          }, 350);
        };
        const end = (e) => {
          if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
          }
          if (gameOver || longPressed) return;
          if (mode === "flag") {
            toggleFlag(cell);
          } else {
            digCell(cell);
          }
        };
        const cancel = () => {
          if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
          }
        };

        el.addEventListener("touchstart", start, { passive: true });
        el.addEventListener("touchend", (e) => {
          e.preventDefault();
          end(e);
        });
        el.addEventListener("touchmove", cancel, { passive: true });

        // Mouse fallback for desktop
        el.addEventListener("mousedown", (e) => {
          if (e.button === 0) start(e);
        });
        el.addEventListener("mouseup", (e) => {
          if (e.button === 0) end(e);
        });
        el.addEventListener("mouseleave", cancel);
        el.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          if (!gameOver) {
            cancel();
            toggleFlag(cell);
          }
        });
      }

      // Mode buttons
      const digBtn = document.getElementById("digMode");
      const flagBtn = document.getElementById("flagMode");
      digBtn.addEventListener("click", () => {
        mode = "dig";
        digBtn.classList.add("active");
        flagBtn.classList.remove("active");
      });
      flagBtn.addEventListener("click", () => {
        mode = "flag";
        flagBtn.classList.add("active");
        digBtn.classList.remove("active");
      });

      // Difficulty
      document.querySelectorAll(".diff-btn").forEach((b) => {
        b.addEventListener("click", () => {
          document
            .querySelectorAll(".diff-btn")
            .forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          diff = b.dataset.diff;
          newGame();
        });
      });

      document.getElementById("resetBtn").addEventListener("click", newGame);
      document.getElementById("playAgain").addEventListener("click", newGame);

      updateMuteUI();
      newGame();
      createIcons({ icons });
    </script>
  </body>
</html>
